<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Свадьба Кирилла и Александры</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f5f5f5;
            color: #1a1a4e; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(26, 26, 78, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-section {
            background: #f8f6f9;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .auth-section label {
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .auth-section input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(26, 26, 78, 0.2);
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            background: #ffffff;
            transition: 0.3s;
        }

        .auth-section input[type="password"]:focus {
            outline: none;
            border-color: #1a1a4e;
            box-shadow: 0 0 0 3px rgba(26, 26, 78, 0.1);
        }

        .btn-auth {
            background: #1a1a4e;
            color: #fff;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-auth:hover {
            background: #c9a84c;
            color: #1a1a4e;
        }

        .auth-hint {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 10px;
            text-align: center;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .hidden {
            display: none !important;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #1a1a4e;
            background: transparent;
            color: #1a1a4e;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #1a1a4e;
            color: #fff;
        }

        .tab-btn:hover {
            background: #c9a84c;
            border-color: #c9a84c;
            color: #1a1a4e;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a4e;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #1a1a4e;
            color: #fff;
        }

        th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .status-yes {
            color: #27ae60;
            font-weight: 500;
        }

        .status-no {
            color: #e74c3c;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-export {
            display: inline-block;
            background: #1a1a4e;
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-export:hover {
            background: #c9a84c;
            color: #1a1a4e;
        }

        .btn-clear {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-clear:hover {
            background: #c0392b;
        }

        .group-label {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 5px;
        }

        .group-family {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .group-relatives {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .group-friend {
            background: #fff3e0;
            color: #e65100;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #ffffff;
            color: #1a1a4e;
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(26, 26, 78, 0.15);
            border: 1px solid rgba(26, 26, 78, 0.08);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 400;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 999;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast .check.error {
            color: #e74c3c;
        }

        @media (max-width: 600px) {
            .admin-container {
                padding: 20px 15px;
            }
            .tabs {
                gap: 5px;
            }
            .tab-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            .stats {
                gap: 20px;
            }
            .stat-number {
                font-size: 22px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">
        <span class="check" id="toastIcon">✔</span>
        <span id="toastMessage">Успешно!</span>
    </div>

    <div class="admin-container">
        <h1>Админ-панель</h1>
        <p class="subtitle">Управление списком гостей</p>

        <!-- Безопасный вход с токеном -->
        <div class="auth-section" id="authSection">
            <label>🔑 Введите GitHub токен для доступа к данным</label>
            <input type="password" id="tokenInput" placeholder="github_pat_xxxx...">
            <button class="btn-auth" onclick="authenticate()">Войти</button>
            <p class="auth-hint">
                Токен сохраняется только в вашем браузере и никуда не отправляется
            </p>
        </div>

        <!-- Основной контент (скрыт до входа) -->
        <div id="mainContent" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-group="all" onclick="switchTab('all')">Все (0)</button>
                <button class="tab-btn" data-group="family" onclick="switchTab('family')">👨‍👩‍👧‍👦 Близкие (0)</button>
                <button class="tab-btn" data-group="relatives" onclick="switchTab('relatives')">👨‍👩‍👦 Дальние (0)</button>
                <button class="tab-btn" data-group="friend" onclick="switchTab('friend')">🍖 Друзья (0)</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Всего ответов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="yesCount">0</div>
                    <div class="stat-label">Придут</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="noCount">0</div>
                    <div class="stat-label">Не придут</div>
                </div>
            </div>

            <div id="responsesContainer">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Загрузка данных...</p>
                </div>
            </div>

            <div class="actions">
                <button class="btn-export" onclick="exportToCSV()">📥 Скачать список (CSV)</button>
                <button class="btn-clear" onclick="clearAll()">🗑 Очистить все</button>
            </div>
        </div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        const REPO_OWNER = 'Kapelka404';
        const REPO_NAME = 'wedding';
        const FILE_PATH = 'data.json';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

        let currentGroup = 'all';
        let allGuests = [];
        let githubToken = '';

        // ===== TOAST =====
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            icon.textContent = isSuccess ? '✔' : '⚠️';
            icon.className = 'check' + (isSuccess ? '' : ' error');
            msg.textContent = message;
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===== АУТЕНТИФИКАЦИЯ =====
        function authenticate() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showToast('Введите GitHub токен', false);
                return;
            }

            githubToken = token;
            
            // Сохраняем в localStorage
            try {
                localStorage.setItem('github_token', token);
            } catch (e) {}
            
            loadData();
        }

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadData() {
            // Если токена нет, пробуем из localStorage
            if (!githubToken) {
                try {
                    const saved = localStorage.getItem('github_token');
                    if (saved) {
                        githubToken = saved;
                        document.getElementById('tokenInput').value = saved;
                    }
                } catch (e) {}
            }

            if (!githubToken) {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('mainContent').classList.add('hidden');
                return;
            }

            const container = document.getElementById('responsesContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">⏳</div>
                    <p>Загрузка данных...</p>
                </div>
            `;

            try {
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    // Файл не существует, создаем пустой
                    await createEmptyData();
                    return;
                }

                if (!response.ok) {
                    if (response.status === 401) {
                        showToast('Неверный токен. Проверьте права доступа', false);
                        document.getElementById('authSection').style.display = 'block';
                        document.getElementById('mainContent').classList.add('hidden');
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const content = atob(data.content);
                const parsed = JSON.parse(content);
                allGuests = parsed.guests || [];

                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
                
                renderData();
                showToast('Данные загружены', true);

            } catch (error) {
                console.error('Ошибка загрузки:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Ошибка загрузки данных. Проверьте подключение.</p>
                        <button style="margin-top:15px;padding:10px 25px;border-radius:50px;border:2px solid #1a1a4e;background:transparent;cursor:pointer;font-family:inherit;" onclick="loadData()">🔄 Попробовать снова</button>
                    </div>
                `;
            }
        }

        // ===== СОЗДАНИЕ ПУСТОГО ФАЙЛА =====
        async function createEmptyData() {
            try {
                const emptyData = { guests: [] };
                const content = btoa(JSON.stringify(emptyData, null, 2));

                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: 'Создание файла данных',
                        content: content
                    })
                });

                if (!response.ok) throw new Error('Ошибка создания файла');
                
                allGuests = [];
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
                renderData();
                showToast('Файл данных создан', true);

            } catch (error) {
                console.error('Ошибка создания файла:', error);
                showToast('Ошибка создания файла данных', false);
            }
        }

        // ===== СОХРАНЕНИЕ ДАННЫХ =====
        async function saveGuests() {
            try {
                // Получаем текущий файл для sha
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                const fileData = await response.json();
                const sha = fileData.sha;
                
                const data = { guests: allGuests };
                const content = btoa(JSON.stringify(data, null, 2));

                const updateResponse = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: 'Обновление списка гостей',
                        content: content,
                        sha: sha
                    })
                });

                if (!updateResponse.ok) {
                    const errorData = await updateResponse.json();
                    console.error('Ошибка сохранения:', errorData);
                    throw new Error('Ошибка сохранения');
                }
                return true;

            } catch (error) {
                console.error('Ошибка сохранения:', error);
                return false;
            }
        }

        // ===== ОТОБРАЖЕНИЕ ДАННЫХ =====
        function renderData() {
            const filtered = currentGroup === 'all' ? allGuests : allGuests.filter(g => g.group === currentGroup);

            // Обновляем счетчики на вкладках
            const groups = {
                all: allGuests.length,
                family: allGuests.filter(g => g.group === 'family').length,
                relatives: allGuests.filter(g => g.group === 'relatives').length,
                friend: allGuests.filter(g => g.group === 'friend').length
            };

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const group = btn.dataset.group;
                const count = groups[group] || 0;
                btn.innerHTML = btn.innerHTML.replace(/\(\d+\)/, `(${count})`);
                btn.classList.toggle('active', group === currentGroup);
            });

            // Статистика
            const total = allGuests.length;
            const yes = allGuests.filter(g => g.presence && g.presence !== 'К сожалению, не смогу').length;
            const no = allGuests.filter(g => g.presence === 'К сожалению, не смогу').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('yesCount').textContent = yes;
            document.getElementById('noCount').textContent = no;

            // Таблица
            const container = document.getElementById('responsesContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Пока нет ни одного ответа${currentGroup !== 'all' ? ' в этой группе' : ''}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Имя</th>
                                <th>Ответ</th>
                                <th>Компания</th>
                                <th>Группа</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filtered.forEach((g, index) => {
                const isYes = g.presence && g.presence !== 'К сожалению, не смогу';
                const statusClass = isYes ? 'status-yes' : 'status-no';
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : 'только что';
                const groupLabel = getGroupLabel(g.group);
                const groupClass = getGroupClass(g.group);

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${escapeHtml(g.name || 'Без имени')}</strong></td>
                        <td class="${statusClass}">${escapeHtml(g.presence || 'Не указано')}</td>
                        <td>${escapeHtml(g.companion || '—')}</td>
                        <td><span class="group-label ${groupClass}">${groupLabel}</span></td>
                        <td style="font-size: 12px; opacity: 0.7;">${date}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function getGroupLabel(group) {
            const labels = { 'family': 'Близкие', 'relatives': 'Дальние', 'friend': 'Друзья' };
            return labels[group] || group || 'Неизвестно';
        }

        function getGroupClass(group) {
            const classes = { 'family': 'group-family', 'relatives': 'group-relatives', 'friend': 'group-friend' };
            return classes[group] || '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        function switchTab(group) {
            currentGroup = group;
            renderData();
        }

        // ===== ЭКСПОРТ В CSV =====
        function exportToCSV() {
            if (allGuests.length === 0) {
                showToast('Нет данных для экспорта', false);
                return;
            }

            const BOM = '\uFEFF';
            let csv = BOM + 'Имя;Ответ;Компания;Группа;Дата\n';

            allGuests.forEach(g => {
                const date = g.created_at ? new Date(g.created_at).toLocaleString('ru-RU') : '';
                const row = [
                    `"${(g.name || '').replace(/"/g, '""')}"`,
                    `"${(g.presence || '').replace(/"/g, '""')}"`,
                    `"${(g.companion || '').replace(/"/g, '""')}"`,
                    `"${getGroupLabel(g.group).replace(/"/g, '""')}"`,
                    `"${date.replace(/"/g, '""')}"`
                ];
                csv += row.join(';') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const now = new Date().toISOString().slice(0, 10);
            link.download = `список_гостей_${now}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            
            showToast('CSV скачан', true);
        }

        // ===== ОЧИСТКА ВСЕХ ДАННЫХ =====
        async function clearAll() {
            if (allGuests.length === 0) {
                showToast('Нет данных для очистки', false);
                return;
            }

            if (!confirm('⚠️ Вы уверены? Это действие удалит ВСЕ сохранённые ответы.')) return;
            if (!confirm('Подтвердите ещё раз: удалить все ответы гостей?')) return;

            allGuests = [];
            const success = await saveGuests();
            
            if (success) {
                renderData();
                showToast('✅ Все данные удалены', true);
            } else {
                showToast('Ошибка при очистке данных', false);
            }
        }

        // ===== ВХОД ПО ENTER =====
        document.getElementById('tokenInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') authenticate();
        });

        // ===== АВТОМАТИЧЕСКИЙ ВХОД =====
        document.addEventListener('DOMContentLoaded', function() {
            const savedToken = localStorage.getItem('github_token');
            if (savedToken) {
                document.getElementById('tokenInput').value = savedToken;
                authenticate();
            }
        });

        console.log('✅ Админ-панель загружена');
    </script>
</body>
</html>
