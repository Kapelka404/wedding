<script>
    // ===== ОТЛАДКА =====
    let debugLogs = [];

    function logDebug(message, data = null) {
        const timestamp = new Date().toLocaleTimeString();
        const log = `[${timestamp}] ${message}${data ? ' ' + JSON.stringify(data, null, 2) : ''}`;
        debugLogs.push(log);
        const content = document.getElementById('debugContent');
        if (content) {
            content.textContent = debugLogs.slice(-20).join('\n');
        }
        console.log('🐛', message, data || '');
    }

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        panel.classList.toggle('show');
        if (panel.classList.contains('show')) {
            logDebug('Отладка включена');
        }
    }

    // ===== МУЗЫКА =====
    document.addEventListener('DOMContentLoaded', function() {
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.3;

        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                const startOnFirstClick = () => {
                    audio.play().catch(() => {});
                    document.removeEventListener('click', startOnFirstClick);
                    document.removeEventListener('touchstart', startOnFirstClick);
                };
                document.addEventListener('click', startOnFirstClick);
                document.addEventListener('touchstart', startOnFirstClick);
            });
        }
    });

    // ===== ОПРЕДЕЛЯЕМ ГРУППУ =====
    const urlParams = new URLSearchParams(window.location.search);
    const group = urlParams.get('group') || 'family';
    logDebug('Группа гостя:', group);

    if (group === 'family') {
        // Близкие: всё как есть
    } else if (group === 'relatives') {
        document.getElementById('banquetBlock').style.display = 'none';
    } else if (group === 'friend') {
        document.getElementById('banquetBlock').style.display = 'none';
        document.getElementById('friendsExtraText').style.display = 'block';
        document.getElementById('mainQuestion').style.display = 'none';
        document.getElementById('friendsQuestion').style.display = 'block';
        document.getElementById('day15').style.border = '2px solid #27ae60';
        document.getElementById('day15').style.borderRadius = '50%';
        document.getElementById('day15').style.padding = '2px';
        document.getElementById('day15').style.color = '#27ae60';
        document.getElementById('day15').style.fontWeight = 'bold';
    }

    // ===== НАСТРОЙКИ GITHUB =====
    const REPO_OWNER = 'Kapelka404';
    const REPO_NAME = 'wedding';
    const FILE_PATH = 'data.json';
    const TOKEN_FILE = 'token.txt';
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
    const TOKEN_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${TOKEN_FILE}`;

    let githubToken = null;

    // ===== ЗАГРУЗКА ТОКЕНА ИЗ ФАЙЛА (с .trim()) =====
    async function loadToken() {
        try {
            logDebug('Загрузка токена из файла:', TOKEN_FILE);
            const response = await fetch(TOKEN_URL);
            
            logDebug('Ответ на загрузку токена:', response.status);
            
            if (!response.ok) {
                logDebug('Ошибка загрузки токена:', response.status);
                if (response.status === 404) {
                    logDebug('❌ Файл token.txt не найден! Создайте его в корне репозитория');
                }
                return false;
            }
            
            const token = await response.text();
            githubToken = token.trim(); // ← ВОТ ЗДЕСЬ .trim() УДАЛЯЕТ ПЕРЕНОСЫ СТРОК
            
            if (githubToken.length < 10) {
                logDebug('❌ Токен слишком короткий! Длина:', githubToken.length);
                return false;
            }
            
            logDebug('✅ Токен загружен, длина:', githubToken.length);
            logDebug('Первые 10 символов:', githubToken.substring(0, 10) + '...');
            
            // Сохраняем в localStorage для быстрого доступа
            try {
                localStorage.setItem('github_token', githubToken);
            } catch (e) {}
            
            return true;
        } catch (error) {
            logDebug('Ошибка загрузки токена:', error.message);
            return false;
        }
    }

    // ===== ФУНКЦИЯ ДЛЯ ПОКАЗА TOAST =====
    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('successToast');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');
        
        icon.textContent = isSuccess ? '✔' : '⚠️';
        icon.className = 'check' + (isSuccess ? '' : ' error');
        msg.textContent = message;
        
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // ===== ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ ДАННЫХ =====
    async function getGuests() {
        logDebug('Получение данных из репозитория...');
        try {
            const response = await fetch(API_URL, {
                headers: {
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            logDebug('Ответ на GET:', response.status);
            
            if (response.status === 404) {
                logDebug('Файл data.json не найден, создадим пустой');
                return { guests: [] };
            }
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            const content = atob(data.content);
            const parsed = JSON.parse(content);
            logDebug('Данные получены, количество гостей:', parsed.guests?.length || 0);
            return parsed;
        } catch (error) {
            logDebug('Ошибка получения данных:', error.message);
            throw error;
        }
    }

    // ===== ФУНКЦИЯ ДЛЯ СОХРАНЕНИЯ ДАННЫХ =====
    async function saveGuests(guestsData) {
        logDebug('Сохранение данных...');
        
        // Загружаем токен, если его нет
        if (!githubToken) {
            const loaded = await loadToken();
            if (!loaded) {
                const errorMsg = '❌ Не удалось загрузить токен';
                logDebug(errorMsg);
                showToast('Техническая ошибка. Попробуйте позже.', false);
                throw new Error('Token not loaded');
            }
        }

        logDebug('Токен для сохранения, длина:', githubToken.length);

        try {
            // Получаем текущий файл для sha
            const getResponse = await fetch(API_URL, {
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            logDebug('Ответ на GET с токеном:', getResponse.status);
            
            let sha = null;
            if (getResponse.ok) {
                const data = await getResponse.json();
                sha = data.sha;
                logDebug('SHA получен:', sha);
            } else if (getResponse.status === 404) {
                logDebug('Файл не найден, создадим новый');
            } else if (getResponse.status === 401) {
                const errorMsg = '❌ Токен невалидный! Проверьте файл token.txt';
                logDebug(errorMsg);
                showToast('Ошибка: невалидный токен. Проверьте настройки.', false);
                throw new Error('Bad credentials');
            } else {
                throw new Error(`HTTP ${getResponse.status}: ${getResponse.statusText}`);
            }
            
            // Кодируем UTF-8 в Base64
            const jsonString = JSON.stringify(guestsData, null, 2);
            logDebug('Данные подготовлены, размер:', jsonString.length);
            
            function utf8ToBase64(str) {
                return new Promise((resolve, reject) => {
                    const blob = new Blob([str], { type: 'text/plain;charset=utf-8' });
                    const reader = new FileReader();
                    reader.onload = function() {
                        const base64 = reader.result.split(',')[1];
                        resolve(base64);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            }
            
            const content = await utf8ToBase64(jsonString);
            logDebug('Base64 готов, длина:', content.length);
            
            const updateResponse = await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: `Добавлен гость: ${guestsData.guests[guestsData.guests.length - 1]?.name || 'Новый гость'}`,
                    content: content,
                    sha: sha
                })
            });
            
            logDebug('Ответ на PUT:', updateResponse.status);
            
            if (!updateResponse.ok) {
                const errorData = await updateResponse.json();
                logDebug('Ошибка сохранения:', errorData);
                
                if (updateResponse.status === 401) {
                    showToast('❌ Токен невалидный! Обновите файл token.txt', false);
                }
                throw new Error(`HTTP ${updateResponse.status}`);
            }
            
            logDebug('✅ Данные сохранены успешно!');
            return true;
        } catch (error) {
            logDebug('Ошибка сохранения:', error.message);
            throw error;
        }
    }

    // ===== ОТПРАВКА ФОРМЫ =====
    document.getElementById("guestForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        logDebug('=== ОТПРАВКА ФОРМЫ ===');
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'ОТПРАВКА...';
        
        const name = document.getElementById("name").value.trim();
        logDebug('Имя:', name);
        
        if (!name) {
            showToast('Пожалуйста, укажите ваше имя', false);
            logDebug('Ошибка: имя не указано');
            submitBtn.disabled = false;
            submitBtn.textContent = 'ОТПРАВИТЬ';
            return;
        }
        
        const presenceElement = document.querySelector('input[name="presence"]:checked');
        if (!presenceElement) {
            showToast('Пожалуйста, выберите вариант ответа', false);
            logDebug('Ошибка: не выбран вариант ответа');
            submitBtn.disabled = false;
            submitBtn.textContent = 'ОТПРАВИТЬ';
            return;
        }
        
        const presence = presenceElement.value;
        const companion = document.getElementById("companion").value.trim() || "Нет";
        
        logDebug('Ответ:', presence);
        logDebug('Компания:', companion);
        logDebug('Группа:', group);
        
        try {
            // Получаем текущие данные
            const data = await getGuests();
            
            // Добавляем нового гостя
            const newGuest = {
                name: name,
                presence: presence,
                companion: companion,
                group: group,
                created_at: new Date().toISOString()
            };
            
            logDebug('Новый гость:', newGuest);
            
            data.guests.push(newGuest);
            logDebug('Всего гостей после добавления:', data.guests.length);
            
            // Сохраняем обновленные данные
            const success = await saveGuests(data);
            
            if (success) {
                showToast('Спасибо! Ваш ответ отправлен. Ждем вас!', true);
                logDebug('✅ Форма успешно отправлена!');
                this.reset();
            } else {
                showToast('Ошибка при сохранении. Попробуйте позже.', false);
                logDebug('❌ Ошибка при сохранении');
            }
        } catch (error) {
            logDebug('❌ Критическая ошибка:', error.message);
            showToast('Ошибка: ' + error.message, false);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'ОТПРАВИТЬ';
        }
    });

    // ===== ТАЙМЕР =====
    const weddingDate = new Date("2026-08-14T13:30:00+03:00").getTime();
    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".timer").innerHTML = "<h2>Свадьба уже сегодня!</h2>";
            return;
        }

        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
        document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
    }, 1000);

    // ===== ЗАГРУЗКА ТОКЕНА ПРИ СТАРТЕ =====
    (async function init() {
        await loadToken();
        logDebug('✅ Сайт загружен! Группа:', group);
        logDebug('🔑 Токен ' + (githubToken ? 'загружен' : 'НЕ ЗАГРУЖЕН'));
        logDebug('💡 Нажмите 🐛 в правом нижнем углу для отладки');
        logDebug('📁 Файл с токеном: ' + TOKEN_FILE);
    })();
</script>
